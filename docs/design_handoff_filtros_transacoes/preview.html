<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Filtros — Transações · Variação C</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #F8F7F5;
        font-family: 'Geist', 'DM Sans', system-ui, sans-serif;
        color: #0F0F0D;
      }
      * { box-sizing: border-box; }
      kbd {
        font-family: 'Geist Mono', ui-monospace, monospace;
      }
      input::placeholder { color: #9CA3AF; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes fadeInDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes drawerIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes progressFill { from { width: 0; } }
      @keyframes countUp { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 99px; }
      ::-webkit-scrollbar-track { background: transparent; }
      .preview-frame {
        max-width: 1280px;
        margin: 24px auto;
        padding: 16px 20px 28px;
      }
      .preview-frame > .head {
        margin-bottom: 18px;
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .preview-frame > .head > h1 {
        font-family: 'Instrument Serif', serif;
        font-weight: 400;
        font-size: 32px;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .preview-frame > .head > .sub {
        font-size: 12px;
        color: #6B6963;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }
    </style>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="shared.jsx"></script>
    <script type="text/babel" src="variation-c-panels.jsx"></script>
    <script type="text/babel" src="variation-c.jsx"></script>

    <script type="text/babel">
      // Fixa a config aprovada da Variação C DEPOIS do shared.jsx (que recria o
      // TweaksContext com defaults popover). Definir aqui garante que vence.
      window.TweaksContext = React.createContext({
        savedViews: "cards",
        facetBar: "cards",
        facetPanel: "inline",
      });
      function App() {
        return (
          <div className="preview-frame">
            <div className="head">
              <h1>Filtros · Transações</h1>
              <span className="sub">Variação C · Faceted Pills</span>
            </div>
            <window.VariationC />
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
